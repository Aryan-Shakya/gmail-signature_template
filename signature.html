<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html>
  <head>
    <!-- PAGE INFO -->
    <meta charset="UTF-8" />
    <meta content="text/html" http-equiv="Content-Type" />
    <title>Email Signature</title>
  </head>

  <body style="font-family: Helvetica, sans-serif;">
    <!-- CONTAINER -->
    <table style="font-family: Helvetica, sans-serif;" cellpadding="0" cellspacing="0">
      <tbody>
        <tr>
          <!-- ==================== SECTION #1 ==================== -->
          <td style="width: 150px; padding: 0; font-family: Verdana; text-align: center; margin: auto;">
            <!-- Photo: UPDATE THIS SRC TO YOUR HOSTED IMAGE URL -->
            <a href="YOUR_PORTFOLIO_LINK" target="_blank">
              <img alt="Aryan Shakya" 
                   style="width: 120px; height: 120px; border-radius: 60px; border: 0;" 
                   src="YOUR_HOSTED_PROFILE_PICTURE_URL"
              >
            </a>
          </td>

          <!-- ==================== DIVIDER ==================== -->
          <td style="height: 140px; border-left: thin solid #112240; padding-right: 15px;"></td>
          <td style="font-family: inherit; padding: 0; margin: auto;">

          <!-- ==================== SECTION #2 ==================== -->
          <table style="font-family: inherit" cellpadding="0" cellspacing="0">
            <tbody>
              <!-- I. Name & Job -->
              <tr>
                <td style="font-family: inherit; padding: 0; vertical-align: top;" valign="top">
                  <strong>
                    <a style="font-family: inherit; color: #112240; font-size: 14pt; text-decoration: none;" 
                       href="YOUR_PORTFOLIO_LINK" 
                       target="_blank"
                    >
                      Aryan Shakya
                    </a>
                  </strong>
                  <br>
                  <span style="font-family: inherit; color: #666666; font-size: 10pt;">
                    Student at DYPIU | Full-Stack Developer
                  </span>
                  <br><br>
                </td>
              </tr>
              <!-- III. Contacts -->
              <tr>
                <td style="font-family: inherit; font-size: 9pt; padding-bottom: 6px; line-height: 18px; vertical-align: top; width: 185px;" valign="top">
                  <!-- Email -->
                  <span style="font-family: inherit; color: #ff0000;">e &sdot; </span>
                  <a style="font-family: inherit; text-decoration: none; color: #666666;" 
                     href="mailto:YOUR_EMAIL_ADDRESS"
                  >
                    YOUR_EMAIL_ADDRESS
                  </a>
                  <br>
                  <!-- Website -->
                  <span style="font-family: inherit; color: #ff0000">w &sdot; </span>
                  <a style="font-family: inherit; text-decoration: none; color: #666666;" 
                    href="YOUR_PORTFOLIO_LINK" target="_blank"
                  >
                    yourportfolio.com
                  </a>
                  <br>
                  <!-- Address -->
                  <span style="font-family: inherit; color: #ff0000">a &sdot; </span>
                  <a style="font-family: inherit; text-decoration: none; color: #666666;" 
                     href="https://maps.app.goo.gl/search-pune" 
                     target="_blank"
                  >
                    Pune, Maharashtra
                  </a>
                </td>
              </tr>
              
              <!-- IV. Links - SAVE YOUR SIGNATURE THEN REMOVE THE EMPTY SPACES NEXT TO YOUR ICONS-->
              <tr>
                <td style="font-family: inherit; width: 140px; padding-top: 4px; padding-left: 0; text-align: left;" valign="left" width="140">
                  <!-- GitHub -->
                  <span>
                    <a style="text-decoration: none; padding: 0 4px;" 
                       href="YOUR_GITHUB_PROFILE_LINK" 
                       target="_blank"
                    ><img alt="github" 
                           style="width: 18px; height: 18px;" 
                           src="YOUR_HOSTED_GITHUB_ICON_URL.png"
                      >
                    </a>
                  </span>
                  <!-- Linkedin -->
                  <span>
                    <a style="text-decoration: none; padding: 0 4px;" 
                        href="YOUR_LINKEDIN_PROFILE_LINK" 
                        target="_blank"
                    ><img alt="linkedin" 
                           style="width: 18px; height: 18px;" 
                           src="YOUR_HOSTED_LINKEDIN_ICON_URL.png"
                      >
                    </a>
                  </span>
                </td>
              </tr>
            </tbody>
          </table>
        </tr>
      </tbody>
    </table>
  </body>
</html>
